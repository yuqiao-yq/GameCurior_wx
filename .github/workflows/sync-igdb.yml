name: Sync IGDB → CloudBase

# 为什么这个跑在 GitHub Actions 而不是云函数：
#   腾讯云函数出口到 id.twitch.tv / api.igdb.com (AWS) 不可达，
#   GitHub runner 出口在海外没有这个问题。
#   详见 cloudfunctions/README.md 「IGDB 数据同步」节。

on:
  schedule:
    # 每天 UTC 19:07 = 北京 03:07（避开整点峰值）
    - cron: '7 19 * * *'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'IGDB 平台 ID（逗号分隔，留空=5 大主机）'
        required: false
        default: '130,167,48,169,49'
      limit:
        description: '每平台拉取数量'
        required: false
        default: '30'

concurrency:
  group: sync-igdb
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
      TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
      CLOUDBASE_SECRET_ID: ${{ secrets.CLOUDBASE_SECRET_ID }}
      CLOUDBASE_SECRET_KEY: ${{ secrets.CLOUDBASE_SECRET_KEY }}
      CLOUD_ENV_ID: ${{ secrets.CLOUD_ENV_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Run IGDB sync
        working-directory: scripts
        run: |
          node sync-igdb-ci.js \
            --platforms='${{ github.event.inputs.platforms || '130,167,48,169,49' }}' \
            --limit='${{ github.event.inputs.limit || '30' }}'
